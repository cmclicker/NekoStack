name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The site is static — no build step. apps/web is uploaded as-is.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
