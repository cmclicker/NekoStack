name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is required — status:check derives releases from `git tag`,
      # and a shallow clone has no tags (would report false drift / false red).
      - name: Checkout (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      # Scoped to implemented packages only — scaffold packages (v0.0.0) lack
      # tsconfig.json / test files and would false-red an unscoped run.
      # Add a --filter here whenever a new package graduates from scaffold to real.
      # Turbo silently skips tasks a package doesn't declare (e.g. ui has no typecheck).
      - name: Typecheck + build + test (implemented packages)
        run: npx turbo run typecheck build test --filter=@nekostack/schema --filter=@nekostack/cli --filter=@nekostack/migrate-runner --filter=@nekostack/theme --filter=@nekostack/ui --filter=@nekostack/lint --filter=@nekostack/test

      - name: Status drift gate
        run: npm run status:check

      # The public site's release history is generated from workspace-status.json
      # (see scripts/generate-site-history.mjs). If the SSOT changed but
      # apps/web/history.html wasn't regenerated, this fails — same discipline as
      # the status gate above.
      - name: Site history drift gate
        run: npm run site:check
      - name: Roadmap drift gate
        run: npm run roadmap:check
